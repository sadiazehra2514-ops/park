<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Dream World</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <nav>
            <div class="logo">Dream World</div>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li><a href="#" class="btn-nav">Join Now</a></li>
            </ul>
        </nav>
    </header>

    <main class="contact-section">
        <div class="contact-wrapper">
            <div class="contact-info">
                <h2>Get in <span class="highlight">Touch</span></h2>
                <p>Have a question about the realm? Reach out and our guides will assist you.</p>
                <div class="info-item">
                    <strong>Location:</strong> The Ethereal Plane, Suite 404
                </div>
                <div class="info-item">
                    <strong>Email:</strong> hello@dreamworld.com
                </div>
            </div>

            <form class="contact-form">
                <div class="form-group">
                    <label>Your Name</label>
                    <input type="text" placeholder="Enter your name" required>
                </div>
                <div class="form-group">
                    <label>Dream ID (Email)</label>
                    <input type="email" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label>Message</label>
                    <textarea rows="5" placeholder="Tell us your story..."></textarea>
                </div>
                <button type="submit" class="btn-primary">Send Message</button>
            </form>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Dream World Project. Connection established.</p>
    </footer>
</body>
</html>
